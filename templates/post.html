{% extends "base.html" %}

{% block title %}
<title>新增溫度資料</title>
<link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
<style>
    body { background-color: #f4f4f4; }
</style>
{% endblock title %}

{% block content %}
<div class="w3-content w3-margin-top w3-margin-bottom" style="max-width:600px;">
    
    <div class="w3-card-4 w3-white w3-round-large">
        <header class="w3-container w3-blue w3-round-large" style="border-bottom-left-radius: 0; border-bottom-right-radius: 0;">
            <h2>新增溫度資料</h2>
        </header>

        <form class="w3-container w3-padding-16" action="{% url 'post' %}" method="post">
            {% csrf_token %}
            
            <p>
                <label class="w3-text-dark-grey"><b>感測器 ID (Sensor ID)</b></label>
                <input class="w3-input w3-border w3-round" type="text" id="sensor_id" name="sensor_id" required placeholder="例如: 1">
            </p>
            
            <p>
                <label class="w3-text-dark-grey"><b>溫度 (Temperature °C)</b></label>
                <input class="w3-input w3-border w3-round" type="number" step="0.1" id="temperature" name="temperature" required placeholder="例如: 25.5">
            </p>

            <p>
                <label class="w3-text-dark-grey"><b>濕度 (Humidity %)</b></label>
                <input class="w3-input w3-border w3-round" type="number" step="0.1" id="humidity" name="humidity" required placeholder="例如: 60.0">
            </p>

            <hr class="w3-border-grey">
            <div class="w3-bar">
                <button type="submit" name="submit" class="w3-button w3-blue w3-round w3-right w3-margin-left">送出儲存</button>
                <button type="reset" name="reset" class="w3-button w3-light-grey w3-border w3-round w3-right">重置</button>
                <a href="{% url 'Temperature' %}" class="w3-button w3-text-blue w3-hover-none w3-hover-text-dark-blue w3-left">
                    <b>&laquo; 返回首頁</b>
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock content %}
